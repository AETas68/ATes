<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>KhạpKhun - ATes</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial; padding: 2rem; }
    .status { margin-top: 1rem; padding: 1rem; border: 1px solid #ddd; border-radius: 6px; }
    .ok { color: green }
    .err { color: red }
  </style>
</head>
<body>
  <h1>KhạpKhun</h1>
  <p>Ứng dụng backend đang chạy. Đây là trang tĩnh mặc định (public/index.html).</p>

  <div class="status" id="status">Đang kiểm tra trạng thái server...</div>

  <script>
    async function checkHealth() {
      try {
        const r = await fetch('/api/health');
        const el = document.getElementById('status');
        if (!r.ok) {
          el.innerHTML = '<strong class="err">Lỗi khi gọi /api/health: ' + r.status + '</strong>';
          return;
        }
        const data = await r.json();
        el.innerHTML = '<strong class="ok">Server trả về: ' + JSON.stringify(data) + '</strong>';
      } catch (err) {
        document.getElementById('status').innerHTML = '<strong class="err">Không thể kết nối tới API: '+err.message+'</strong>';
      }
    }
    checkHealth();
  </script>
</body>
</html>
